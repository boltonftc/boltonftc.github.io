title: Bolton Robotics FTC
author: The Bolton Robotics Team

remote_theme: daattali/beautiful-jekyll@6.0.1

navbar-links:
  Home: ""
  Schedule: "schedule/"
  Programming: "programming/"
  Electrical: "electrical/"
  Mechanical:
    - "Overview": "mechanical/"
    - "goBILDA RI3D": "mechanical/gobilda-ri3d/"

title-img: assets/img/br_top.JPG


navbar-col: "#EAEAEA"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

navbar-var-length: true

markdown: kramdown
highlighter: rouge
permalink: /:path/
kramdown:
  input: GFM

defaults:
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - tools/
  - "*.py"

plugins:
  - jekyll-sitemap
